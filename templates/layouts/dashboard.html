{% extends "base.html" %}

{% block sidebar %}
<aside class="w-64 bg-white border-r border-gray-200 flex-shrink-0 hidden lg:block">
    <nav class="p-4 space-y-1">
        <a href="{% url 'dashboard' %}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg
                  {% if request.resolver_match.url_name == 'dashboard' %}bg-blue-50 text-blue-700 font-semibold
                  {% else %}text-gray-600 hover:bg-gray-50{% endif %}">
            Dashboard
        </a>
        {% if perms.processos.view_processo or profile.is_secretaria_ou_acima %}
        <a href="{% url 'processos:lista' %}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
            Processos
        </a>
        {% endif %}
        {% if profile.is_secretaria_ou_acima %}
        <a href="{% url 'processos:novo' %}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
            Novo Processo
        </a>
        {% endif %}
    </nav>
</aside>
{% endblock %}
