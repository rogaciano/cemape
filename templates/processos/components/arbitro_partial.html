<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
    <h3 class="text-sm font-semibold text-gray-800 mb-3">Árbitro</h3>
    {% if processo.arbitro %}
        <p class="text-sm font-medium text-gray-900">{{ processo.arbitro.get_full_name }}</p>
        <p class="text-xs text-gray-400">{{ processo.arbitro.email }}</p>
    {% else %}
        <p class="text-sm text-gray-400 mb-3">Nenhum árbitro atribuído.</p>
    {% endif %}

    {% if perms.processos.pode_atribuir_arbitro %}
    <form hx-post="{% url 'processos:atribuir_arbitro' processo.pk %}"
          hx-target="#arbitro-container"
          hx-swap="outerHTML"
          class="mt-3">
        {% csrf_token %}
        <select name="arbitro"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">— Selecionar árbitro —</option>
            {% for u in arbitros_disponiveis %}
            <option value="{{ u.pk }}" {% if processo.arbitro_id == u.pk %}selected{% endif %}>
                {{ u.get_full_name|default:u.username }}
            </option>
            {% endfor %}
        </select>
        <button type="submit"
                class="mt-2 w-full bg-gray-800 text-white py-2 rounded-lg text-sm hover:bg-gray-900 transition">
            Atribuir
        </button>
    </form>
    {% endif %}
</div>
