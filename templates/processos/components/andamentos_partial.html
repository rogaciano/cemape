<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <h2 class="text-base font-semibold text-gray-800 mb-4">Andamentos</h2>

    <form hx-post="{% url 'processos:registrar_andamento' processo.pk %}"
          hx-target="#andamentos-container"
          hx-swap="outerHTML"
          hx-on::after-request="this.reset()"
          class="flex gap-2 mb-5">
        {% csrf_token %}
        <textarea name="descricao" rows="2" placeholder="Registrar andamento..."
                  class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
        <button type="submit"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm font-medium self-end">
            Registrar
        </button>
    </form>

    {% if andamentos %}
    <ul class="space-y-3">
        {% for a in andamentos %}
        <li class="border-l-2 border-gray-200 pl-4 py-1">
            <p class="text-sm text-gray-700">{{ a.descricao }}</p>
            <p class="text-xs text-gray-400 mt-1">
                {{ a.registrado_por.get_full_name|default:a.registrado_por.username }} — {{ a.created_at|date:"d/m/Y H:i" }}
            </p>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-sm text-gray-400">Nenhum andamento registrado.</p>
    {% endif %}
</div>
