<header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="container mx-auto px-4 max-w-7xl">
        <div class="flex items-center justify-between h-16">
            <a href="{% url 'dashboard' %}" class="flex items-center gap-2">
                <span class="text-xl font-bold text-blue-700">CEMAPE</span>
                <span class="hidden sm:block text-xs text-gray-500 font-normal">Mediação e Arbitragem</span>
            </a>

            {% if request.user.is_authenticated %}
            <div class="relative" x-data="{ menu: false }">
                <button @click="menu = !menu" @click.outside="menu = false"
                        class="flex items-center gap-2 text-sm font-medium text-gray-700 hover:text-gray-900">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm">
                        {{ request.user.first_name|first|upper|default:request.user.username|first|upper }}
                    </div>
                    <span class="hidden sm:block">{{ request.user.get_full_name|default:request.user.username }}</span>
                </button>
                <div x-show="menu" x-transition x-cloak
                     class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border py-1 z-50">
                    <div class="px-4 py-2 text-xs text-gray-500 border-b">
                        {{ profile.get_role_display|default:"Usuário" }}
                    </div>
                    <a href="{% url 'accounts:perfil' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Meu Perfil</a>
                    <hr class="my-1">
                    <form method="POST" action="{% url 'accounts:logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">Sair</button>
                    </form>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</header>
